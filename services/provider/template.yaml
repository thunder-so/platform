AWSTemplateFormatVersion: '2010-09-09'
Transform: 'AWS::Serverless-2016-10-31'
Description: >
  provider-service
  This function is invoked from the customer account
  When customer installs ThunderProviderStack

Parameters:
  Environment:
    Type: String
    # Default: sandbox

Resources:

  ProviderFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'ProviderFunctionRole-${Environment}'
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess
      Policies:
        - PolicyName: AllowInvokeFromCustomers
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: "*"

  ProviderFunctionInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt ProviderFunction.Arn
      Principal: "*" 

  ProviderFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'ProviderFunction-${Environment}'
      CodeUri: .
      Handler: src/status.handler
      Role: !GetAtt ProviderFunctionRole.Arn
      Architectures:
        - x86_64
      Runtime: nodejs20.x
      MemorySize: 128
      Timeout: 180
      Environment:
        Variables:
          NODE_OPTIONS: --enable-source-maps false
          REGION: !Ref AWS::Region
      Policies:
        - AWSLambdaBasicExecutionRole
      #   - SSMParameterReadPolicy:
      #       ParameterName: /thunder/sandbox/*
      #   - KMSDecryptPolicy:
      #       KeyId: alias/aws/ssm
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        Sourcemap: false
        EntryPoints: 
          - src/status.ts
        External: 
          - '@aws-sdk/*'
          - '@supabase/supabase-js'
          - 'aws-cloudformation-custom-resource'

Outputs:
  ProviderFunctionRoleArn:
    Description: ARN of the Role created for Provider Function
    Value: !GetAtt ProviderFunctionRole.Arn
  ProviderFunctionArn:
    Description: ARN of the Provider Function
    Value: !GetAtt ProviderFunction.Arn
