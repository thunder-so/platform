AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'runner-service  Get stack and run CDK deploy on customer account

  '
Parameters:
  Environment:
    Type: String
  PingEventBusArn:
    Type: String
Resources:
  RunnerBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName:
        Fn::Sub: thunder-runner-${Environment}
      LifecycleConfiguration:
        Rules:
        - ExpirationInDays: 30
          Status: Enabled
  RunnerQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName:
        Fn::Sub: RunnerQueue-${Environment}.fifo
      FifoQueue: true
  RunnerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName:
        Fn::Sub: RunnerRole-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service:
            - lambda.amazonaws.com
            - codebuild.amazonaws.com
            - s3.amazonaws.com
            - sqs.amazonaws.com
            - cloudformation.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/AWSCodeBuildDeveloperAccess
      - arn:aws:iam::aws:policy/AmazonS3FullAccess
      - arn:aws:iam::aws:policy/AmazonSQSFullAccess
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: SSMParameterAccessPolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - ssm:GetParameter
            - ssm:GetParameters
            - ssm:GetParameterHistory
            - kms:Decrypt
            Resource: arn:aws:ssm:us-east-1:665186350589:parameter/thunder/*
      - PolicyName: AssumeRolePolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - sts:AssumeRole
            Resource: arn:aws:iam::*:role/*
      - PolicyName: CDKDeploymentPolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - codebuild:StartBuild
            Resource:
              Fn::Sub: arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:project/RunnerBuild-${Environment}
          - Effect: Allow
            Action:
            - iam:CreateRole
            - iam:DeleteRole
            - iam:PutRolePolicy
            - iam:DeleteRolePolicy
            - iam:GetRole
            - iam:GetRolePolicy
            - iam:PassRole
            - iam:CreateInstanceProfile
            - iam:DeleteInstanceProfile
            - iam:AddRoleToInstanceProfile
            - iam:RemoveRoleFromInstanceProfile
            Resource: '*'
  RunnerBuild:
    Type: AWS::CodeBuild::Project
    Properties:
      Name:
        Fn::Sub: RunnerBuild-${Environment}
      Source:
        Type: NO_SOURCE
        BuildSpec: "version: 0.2\nphases:\n  install:\n    runtime-versions:\n   \
          \   nodejs: 20 \n    commands: \n      - \n"
      Artifacts:
        Type: S3
        Location:
          Ref: RunnerBucket
        Packaging: NONE
        Path: artifacts/
      Environment:
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        Type: LINUX_CONTAINER
      ServiceRole:
        Fn::GetAtt:
        - RunnerRole
        - Arn
  RunnerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: RunnerFunction-${Environment}
      CodeUri: RunnerFunction
      Handler: runner.handler
      Role:
        Fn::GetAtt:
        - RunnerRole
        - Arn
      Architectures:
      - x86_64
      Runtime: nodejs20.x
      MemorySize: 1536
      Timeout: 10
      Environment:
        Variables:
          NODE_OPTIONS: --enable-source-maps false
          REGION:
            Ref: AWS::Region
          RUNNER_BUCKET:
            Ref: RunnerBucket
          RUNNER_BUILD:
            Ref: RunnerBuild
          EVENT_TARGET:
            Ref: PingEventBusArn
      Policies:
      - SSMParameterReadPolicy:
          ParameterName: /thunder/*
      - KMSDecryptPolicy:
          KeyId: alias/aws/ssm
      - AWSLambdaBasicExecutionRole
      Events:
        RunnerQueueEvent:
          Type: SQS
          Properties:
            Queue:
              Fn::GetAtt:
              - RunnerQueue
              - Arn
            BatchSize: 1
            Enabled: true
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
        - src/runner.ts
        External:
        - '@aws-sdk/*'
        - '@supabase/supabase-js'
        - '@plunk/node'
        - '@react-email/components'
        - '@react-email/render'
        - react
        - react-dom
        Minify: true
        Sourcemap: false
        Target: ESNext
      SamResourceId: RunnerFunction
  RunnerStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: RunnerStatusFunction-${Environment}
      CodeUri: RunnerStatusFunction
      Handler: status.handler
      Role:
        Fn::GetAtt:
        - RunnerRole
        - Arn
      Runtime: nodejs20.x
      MemorySize: 1536
      Timeout: 5
      Environment:
        Variables:
          NODE_OPTIONS: --enable-source-maps false
          REGION:
            Ref: AWS::Region
      Policies:
      - AWSLambdaBasicExecutionRole
      - Version: '2012-10-17'
        Statement:
          Effect: Allow
          Action:
          - codebuild:BatchGetBuilds
          Resource: '*'
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
        - src/status.ts
        External:
        - '@aws-sdk/*'
        - '@supabase/supabase-js'
        - '@plunk/node'
        - '@react-email/components'
        - '@react-email/render'
        - react
        - react-dom
        Minify: true
        Sourcemap: false
        Target: ESNext
      SamResourceId: RunnerStatusFunction
  BuildStatusRule:
    Type: AWS::Events::Rule
    Properties:
      EventPattern:
        source:
        - aws.codebuild
        detail-type:
        - CodeBuild Build State Change
        detail:
          project-name:
          - Fn::Sub: RunnerBuild-${Environment}
          build-status:
          - SUCCEEDED
          - FAILED
          - STOPPED
      Targets:
      - Arn:
          Fn::GetAtt:
          - RunnerStatusFunction
          - Arn
        Id: RunnerStatusFunction
      State: ENABLED
  PermissionForEventsToInvokeLambda:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName:
        Fn::GetAtt:
        - RunnerStatusFunction
        - Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn:
        Fn::GetAtt:
        - BuildStatusRule
        - Arn
Outputs:
  RunnerQueueUrl:
    Description: URL of the SQS queue for runner
    Value:
      Ref: RunnerQueue
  RunnerRoleArn:
    Description: ARN of the IAM Role for runner
    Value:
      Fn::GetAtt:
      - RunnerRole
      - Arn
  RunnerBuildProjectArn:
    Description: ARN of the CodeBuild project for runner
    Value:
      Fn::Sub: arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:project/RunnerBuild-${Environment}
  RunnerFunctionArn:
    Description: ARN of the Runner Function
    Value:
      Fn::GetAtt:
      - RunnerFunction
      - Arn
  RunnerStatusFunctionArn:
    Description: ARN of the Build Status Function
    Value:
      Fn::GetAtt:
      - RunnerStatusFunction
      - Arn
