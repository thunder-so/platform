AWSTemplateFormatVersion: '2010-09-09'
Transform: 'AWS::Serverless-2016-10-31'
Description: >
  yeet-service 
  Destroy CDK stack and resources on customer account

Parameters:
  Environment:
    Type: String

Resources:
  YeetBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'thunder-yeet-${Environment}'
      LifecycleConfiguration:
        Rules:
          - ExpirationInDays: 30
            Status: Enabled

  YeetQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'YeetQueue-${Environment}.fifo'
      FifoQueue: true

  YeetRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'YeetRole-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 
                - lambda.amazonaws.com
                - codebuild.amazonaws.com
                - s3.amazonaws.com
                - sqs.amazonaws.com
                - cloudformation.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSCodeBuildDeveloperAccess
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/AmazonSQSFullAccess
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AssumeRolePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sts:AssumeRole
                Resource: arn:aws:iam::*:role/* # can assume any provider
        - PolicyName: CDKDeploymentPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRole
                  - iam:GetRolePolicy
                  - iam:PassRole
                  - iam:CreateInstanceProfile
                  - iam:DeleteInstanceProfile
                  - iam:AddRoleToInstanceProfile
                  - iam:RemoveRoleFromInstanceProfile
                Resource: '*'

  YeetBuild:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub 'YeetBuild-${Environment}'
      Source:
        Type: NO_SOURCE
        BuildSpec: |
          version: 0.2
          phases:
            install:
              runtime-versions:
                nodejs: 20 
              commands: 
                - 
      Artifacts:
        Type: S3
        Location: !Ref YeetBucket
        Packaging: NONE
        Path: artifacts/
      Environment:
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        Type: LINUX_CONTAINER
      ServiceRole: !GetAtt YeetRole.Arn

  YeetFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'YeetFunction-${Environment}'
      CodeUri: .
      Handler: src/event.handler
      Role: !GetAtt YeetRole.Arn
      Architectures:
        - x86_64
      Runtime: nodejs20.x
      MemorySize: 1536
      Timeout: 10
      Environment:
        Variables:
          NODE_OPTIONS: --enable-source-maps false
          REGION: !Ref AWS::Region
          YEET_BUCKET: !Ref YeetBucket
          YEET_BUILD: !Ref YeetBuild
      Policies:
        - AWSLambdaBasicExecutionRole
      Events:
        YeetQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt YeetQueue.Arn
            BatchSize: 1
            Enabled: true
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "ESNext"
        Sourcemap: false
        EntryPoints:
          - src/event.ts
        External: 
          - '@aws-sdk/*'
          - '@supabase/supabase-js'

  YeetCleanupFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'YeetCleanupFunction-${Environment}'
      CodeUri: .
      Handler: src/cleanup.handler
      Role: !GetAtt YeetRole.Arn
      Runtime: nodejs20.x
      MemorySize: 1536
      Timeout: 5
      Environment:
        Variables:
          NODE_OPTIONS: --enable-source-maps false
          REGION: !Ref AWS::Region
      Policies:
        - AWSLambdaBasicExecutionRole
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "ESNext"
        Sourcemap: false
        EntryPoints:
          - src/cleanup.ts
        External: 
          - '@aws-sdk/*'
          - '@supabase/supabase-js'

  YeetCleanupRule:
    Type: AWS::Events::Rule
    Properties:
      EventPattern:
        source:
          - "aws.codebuild"
        detail-type:
          - "CodeBuild Build State Change"
        detail:
          project-name:
            - !Sub 'YeetBuild-${Environment}'
          build-status:
            - "SUCCEEDED"
            - "FAILED"
            - "STOPPED"
      Targets:
        - Arn: !GetAtt YeetCleanupFunction.Arn
          Id: "YeetCleanupFunction"
      State: ENABLED

  PermissionForEventsToInvokeLambda:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt YeetCleanupFunction.Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt YeetCleanupRule.Arn

Outputs:
  YeetQueueUrl:
    Description: URL of the SQS queue for Yeet
    Value: !Ref YeetQueue
  YeetRoleArn:
    Description: ARN of the IAM Role for Yeet
    Value: !GetAtt YeetRole.Arn
  YeetBuildProjectArn:
    Description: ARN of the CodeBuild project for Yeet
    Value: !Sub 'arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:project/YeetBuild-${Environment}'
  YeetFunctionArn:
    Description: ARN of the Yeet Function
    Value: !GetAtt YeetFunction.Arn
  YeetCleanupFunctionArn:
    Description: ARN of the Yeet Cleanup Function
    Value: !GetAtt YeetCleanupFunction.Arn
